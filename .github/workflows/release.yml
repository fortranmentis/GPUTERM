name: Release Build

# Builds the desktop installers (Windows NSIS .exe, Linux .deb, macOS .dmg)
# and attaches them to the GitHub release for the given tag. Runs on tag
# pushes, or manually via workflow_dispatch for an existing tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and attach installers to (e.g. v1.0.8-beta)"
        required: true
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundles: nsis
          - platform: ubuntu-22.04
            bundles: deb
          - platform: macos-latest
            bundles: dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      # The vendored OpenSSL build assembles with NASM on MSVC.
      - name: Install NASM
        if: matrix.platform == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "GpuTerm __VERSION__"
          prerelease: true
          args: --bundles ${{ matrix.bundles }}

[package]
name = "gputerm"
version = "0.1.0"
description = "GpuTerm desktop SSH/SFTP client with GPU monitoring"
authors = ["GpuTerm"]
license = "MIT"
repository = ""
edition = "2021"
rust-version = "1.77"

[lib]
name = "gputerm_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ssh2 = "0.9"
tauri = { version = "2", features = [] }
thiserror = "2"
uuid = { version = "1", features = ["v4", "serde"] }
